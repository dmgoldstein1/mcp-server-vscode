# Generated by GitHub Copilot using Claude Sonnet 4.5
# Description: OpenTelemetry Collector configuration for N|Solid telemetry

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # NOTE: The `clickhouse` exporter is provided by the OpenTelemetry Collector
  # Contrib distribution (e.g., `otel/opentelemetry-collector-contrib`), not
  # the core collector. Ensure you are using the contrib image/binary.
  clickhouse:
    endpoint: clickhouse://clickhouse:9000
    database: nsolid
    username: nsolid
    password: nsolid
    table: telemetry
    ttl: 168h  # 7 days
    traces_table_name: traces
    metrics_table_name: metrics
    logs_table_name: logs

  prometheus:
    endpoint: 0.0.0.0:8888
    namespace: nsolid

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse, prometheus]
    
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
